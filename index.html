<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaveEuropa.store</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 3.8rem;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 10px;
        }

        .tagline {
            font-size: 1.3rem;
            color: #bbbbbb;
            margin-bottom: 50px;
        }

        .message {
            background: #111111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 40px 30px;
            margin-bottom: 40px;
        }

        .message h1 {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .message p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #cccccc;
        }

        .products {
            margin: 25px 0;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .product {
            background: #1a1a1a;
            color: #ffd700;
            padding: 8px 20px;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
        }

        .status {
            color: #ffd700;
            font-weight: 600;
            font-size: 1.1rem;
            margin-top: 20px;
        }

        .footer {
            margin-top: 60px;
            color: #666;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">SaveEuropa.store</div>
        <div class="tagline">Premium Shirts & Hoodies</div>

        <div class="message">
            <h1>Website Under Construction</h1>
            <p>
                We're building a clean collection of quality shirts and hoodies 
                celebrating European heritage and identity.<br><br>
                Launching very soon.
            </p>

            <div class="products">
                <div class="product">Shirts</div>
                <div class="product">Hoodies</div>
            </div>

            <div class="status">● IN DEVELOPMENT</div>
        </div>

        <div class="footer">
            © 2026 SaveEuropa.store • All Rights Reserved
        </div>
    </div>
</body>
</html>
